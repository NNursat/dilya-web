<!-- frontend/src/app/components/habits/habits.component.html -->
<div class="habits-container">
  <div class="habits-header">
    <h1>My Habits</h1>
    <button class="btn-primary" (click)="toggleCreateForm()">
      {{ showCreateForm ? 'Cancel' : '+ New Habit' }}
    </button>
  </div>

  <!-- Create Habit Form -->
  <div class="create-form" *ngIf="showCreateForm">
    <h3>Create New Habit</h3>
    <form (ngSubmit)="createHabit()">
      <div class="form-group">
        <label for="habitName">Habit Name *</label>
        <input 
          type="text" 
          id="habitName"
          [(ngModel)]="newHabit.name" 
          name="name"
          placeholder="e.g., Morning Exercise"
          required
        />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select 
          id="category" 
          name="category" 
          [(ngModel)]="newHabit.category" 
          required
        >
          <option [ngValue]="undefined" disabled>Select a category</option>
          <option *ngFor="let cat of categories" [ngValue]="cat.id">
            {{ cat.name }}
          </option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="frequency">Frequency</label>
          <select id="frequency" [(ngModel)]="newHabit.frequency" name="frequency">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>

        <div class="form-group">
          <label for="goal">Daily Goal</label>
          <input 
            type="number" 
            id="goal"
            [(ngModel)]="newHabit.goal" 
            name="goal"
            min="1"
          />
        </div>
      </div>

      <button type="submit" class="btn-primary">Create Habit</button>
    </form>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <!-- Loading State -->
  <div class="loading" *ngIf="isLoading">
    Loading habits...
  </div>

  <!-- Habits List -->
  <div class="habits-list" *ngIf="!isLoading">
    <div class="habit-card" *ngFor="let habit of habits" 
         [class.completed]="isTodayComplete(habit)">
      
      <div class="habit-info">
        <div class="habit-header">
          <h3>{{ habit.name }}</h3>
          <span class="streak" *ngIf="habit.streak">
            🔥 {{ habit.streak }} day streak
          </span>
        </div>
        
        <p class="habit-description" *ngIf="habit.description">
          {{ habit.description }}
        </p>
        
        <div class="habit-meta">
          <span class="frequency">{{ habit.frequency || 'daily' }}</span>
          <span class="goal">Goal: {{ habit.goal || 1 }}/day</span>
        </div>
      </div>

      <div class="habit-actions">
        <button 
          class="btn-complete" 
          (click)="completeHabit(habit)"
          [disabled]="isTodayComplete(habit)"
        >
          {{ isTodayComplete(habit) ? '✓ Done Today' : 'Mark Complete' }}
        </button>
        
        <button class="btn-delete" (click)="deleteHabit(habit)">
          Delete
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="habits.length === 0">
      <p>No habits yet. Create your first habit to get started! 🎯</p>
    </div>
  </div>
</div>
